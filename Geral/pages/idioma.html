<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações - Idioma | A-TRAIN</title>

    <link rel="stylesheet" href="../CSS/configuracoes.css">
</head>

<body>

<header class="topo-mobile">
    <button class="menu-toggle">☰</button>
</header>

<div class="container">

    <aside class="sidebar">

        <div class="logo">
            <img src="../assets/Logo A-Train.png"
                 alt="Logo"
                 class="logo-img">
        </div>

        <nav>

            <a href="../pages/dashboard.html">
                <img src="../assets/home.png" class="icone-menu">
                <span>Home</span>
                
            </a>

            <a href="../pages/trens.html">
                <img src="../assets/train.png" class="icone-menu">
                <span>Trens</span>
            </a>

            <a href="../pages/alertas.html">
                <img src="../assets/alerta.png" class="icone-menu">
                <span>Alertas</span>
            </a>

            <a href="../pages/usuarios.html">
                <img src="../assets/usuario.png" class="icone-menu">
                <span>Usuários</span>
            </a>

            <a class="active" href="../pages/configuracoes.html">
                <img src="../assets/configuracao.png" class="icone-menu">
                <span>Configurações</span>
            </a>

        </nav>

        <div class="bottom">

            <a href="../pages/usuarios.html" class="perfil">
                <img src="../assets/usuario.png" class="icone-menu">
                <span>Usuário</span>
            </a>

            <a href="#">
                <img src="../assets/sair.png" class="icone-menu">
                <span>Sair</span>
            </a>

        </div>

    </aside>

    <main class="conteudo">

        <div class="titulo">

            <img src="../assets/configuracao.png"
                 class="icone-config">

            <h1>Configurações</h1>

            <p>
                Gerencie as preferências e configurações da sua conta.
            </p>

        </div>

        <section class="config-grid">


            <div class="idioma-card">

                <div class="idioma-topo">

                    <div class="titulo-card">

                        <img src="../assets/idioma.png">

                        <div>

                            <h3>Idioma</h3>

                            <span>Escolha o idioma da plataforma.</span>

                        </div>

                    </div>

                    <span class="seta">⌃</span>

                </div>

                <div class="lista-idiomas">

                    <label class="linha ativo">

                        <div>

                            <strong>Português</strong>

                            <span class="badge">Atual</span>

                        </div>

                        <input
                            type="radio"
                            name="idioma"
                            checked>

                    </label>

                    <label class="linha">

                        <span>English (EUA)</span>

                        <input type="radio" name="idioma">

                    </label>

                    <label class="linha">

                        <span>Español</span>

                        <input type="radio" name="idioma">

                    </label>

                    <label class="linha">

                        <span>Français</span>

                        <input type="radio" name="idioma">

                    </label>

                    <label class="linha">

                        <span>Русский (Russo)</span>

                        <input type="radio" name="idioma">

                    </label>

                    <label class="linha">

                        <span>العربية (Árabe)</span>

                        <input type="radio" name="idioma">

                    </label>

                    <label class="linha">

                        <span>中文 (Mandarim)</span>

                        <input type="radio" name="idioma">

                    </label>

                    <label class="linha">

                        <span>日本語 (Japonês)</span>

                        <input type="radio" name="idioma">

                    </label>

                    <label class="linha">

                        <span>한국어 (Coreano)</span>

                        <input type="radio" name="idioma">

                    </label>

                    <label class="linha">

                        <span>Italiano</span>

                        <input type="radio" name="idioma">

                    </label>

                    <label class="linha">

                        <span>Deutsch (Alemão)</span>

                        <input type="radio" name="idioma">

                    </label>

                </div>

            </div>


            <div class="menu-config">

                <a href="configuracoes-senha.html" class="item-config">

                    <div>

                        <img src="../assets/senha.png">

                        <span>Senhas</span>

                    </div>

                    <img src="../assets/seta-direita.png.svg">

                </a>

                <a href="#" class="item-config">

                    <div>

                        <img src="../assets/perfil.png">

                        <span>Contas</span>

                    </div>

                    <img src="../assets/seta-direita.png.svg">

                </a>

                <a href="#" class="item-config">

                    <div>

                        <img src="../assets/pagamento.png">

                        <span>Pagamento</span>

                    </div>

                    <img src="../assets/seta-direita.png.svg">

                </a>

                <a href="#" class="ajuda">

                    ❔ Quer Ajuda?

                </a>

            </div>

        </section>

    </main>

</div>

<script>

const toggle=document.querySelector(".menu-toggle");
const sidebar=document.querySelector(".sidebar");

toggle.addEventListener("click",()=>{
    sidebar.classList.toggle("active");
});

</script>

</body>
</html>
