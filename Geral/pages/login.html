<!DOCTYPE html> <html lang="pt-BR"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Metrô - Login e Cadastro</title> <link rel="preconnect" href="https://fonts.googleapis.com"> <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> <link rel="stylesheet" href="../CSS/login.css"> </head> <body> <main class="app-container"> <section class="card active" id="tela-cadastro"> <header class="card-header"> <div class="logo-trem"> <i class="fa-solid fa-train-subway" aria-hidden="true"></i> </div> <button type="button" class="btn-close" id="btn-fechar-cadastro" aria-label="Fechar cadastro"> <i class="fa-solid fa-xmark" aria-hidden="true"></i> </button> </header> <div class="profile-summary"> <div class="profile-avatar"> <i class="fa-regular fa-user" aria-hidden="true"></i> </div> <h1>Olá, Username!</h1> </div> <form class="form-content"> <div class="input-group"> <input type="text" id="reg-username" placeholder=" " required autocomplete="username"> <label for="reg-username">Escolha seu nome de usuário</label> </div> <div class="input-group"> <input type="email" id="reg-email" placeholder=" " required autocomplete="email"> <label for="reg-email">Digite seu Email</label> </div> <div class="input-group"> <input type="password" id="reg-senha" placeholder=" " required autocomplete="new-password"> <label for="reg-senha">Digite sua senha</label> </div> <div class="input-group"> <input type="password" id="reg-confirma" placeholder=" " required autocomplete="new-password"> <label for="reg-confirma">Confirme sua senha</label> </div> <footer class="form-footer"> <button type="submit" class="btn-submit">Cadastrar</button> </footer> </form> </section> <section class="card" id="tela-login"> <header class="card-header"> <div class="logo-trem"> <i class="fa-solid fa-train-subway" aria-hidden="true"></i> </div> <button type="button" class="btn-close" id="btn-fechar-login" aria-label="Fechar login"> <i class="fa-solid fa-xmark" aria-hidden="true"></i> </button> </header> <div class="profile-summary"> <div class="profile-avatar"> <i class="fa-regular fa-user" aria-hidden="true"></i> </div> <h2>Olá, Username!</h2> </div> <form class="form-content"> <div class="input-group password-wrapper"> <input type="password" id="login-senha" placeholder=" " required autocomplete="current-password"> <label for="login-senha">Senha</label> <button type="button" class="btn-toggle-visibility" aria-label="Mostrar ou ocultar senha"> <i class="fa-regular fa-eye" aria-hidden="true"></i> </button> </div> <div class="navigation-links"> <a href="#" class="link-action" id="link-esqueci-senha"> Esqueci minha senha <i class="fa-solid fa-chevron-right" aria-hidden="true"></i> </a> </div> <footer class="form-footer"> <button type="submit" class="btn-submit">Entrar</button> </footer> </form> </section> </main> <script> const telaCadastro = document.getElementById('tela-cadastro'); const telaLogin = document.getElementById('tela-login'); const btnFecharCadastro = document.getElementById('btn-fechar-cadastro'); const btnFecharLogin = document.getElementById('btn-fechar-login'); const linkEsqueci = document.getElementById('link-esqueci-senha'); btnFecharCadastro.addEventListener('click', () => { telaCadastro.classList.remove('active'); telaLogin.classList.add('active'); }); btnFecharLogin.addEventListener('click', () => { telaLogin.classList.remove('active'); telaCadastro.classList.add('active'); }); linkEsqueci.addEventListener('click', (e) => { e.preventDefault(); alert('Funcionalidade de recuperar senha simulada com sucesso!'); }); </script> </body> </html>
