<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil</title>

 

  <link rel="stylesheet" href="../CSS/usuarios.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZmHnM+YIY5t3ZV4y/faTqgFtohetphbbj0EVyF5i1BIsZ+ywDWZCvqsWf9cA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>


<div class="container">

    <!-- MENU LATERAL -->
    <aside class="sidebar">

        <div class="logo">
            <i class="fas fa-train"></i>
        </div>

        <nav>
            <a href="#"><i class="fas fa-house"></i></a>
            <a href="#" class="active"><i class="fas fa-user"></i></a>
            <a href="#"><i class="fas fa-bell"></i></a>
        </nav>

    </aside>

    <!-- CONTEÚDO -->
    <main class="content">

        <header class="topbar">
            <h1>Meu Perfil</h1>

            <button class="settings-btn">
                <i class="fas fa-gear"></i>
            </button>
        </header>

        <section class="profile-container">

            <!-- ESQUERDA -->
            <div class="profile-info">

                <div class="profile-photo">
                    <i class="far fa-user"></i>
                </div>

                <div class="row">
                    <input type="text" placeholder="Nome">
                    <input type="text" placeholder="Ativo desde">
                </div>

                <input type="email" placeholder="E-mail">

                <input type="tel" placeholder="Telefone">

            </div>

            <!-- DIREITA -->
            <div class="map-card">

                <div class="map-background">

                    <div class="pin">
                        <i class="fas fa-location-dot"></i>
                    </div>

                </div>

            </div>

        </section>

    </main>

</div>

<script src="../js/usuarios.js" defer></script>
</body>
</html>
